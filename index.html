<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>靠谱人格测试</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.55) 0, rgba(255,255,255,0) 18%),
        radial-gradient(circle at 86% 10%, rgba(255,255,255,0.48) 0, rgba(255,255,255,0) 16%),
        radial-gradient(circle at 78% 82%, rgba(255,255,255,0.42) 0, rgba(255,255,255,0) 20%),
        linear-gradient(135deg, #ffb7da 0%, #ffd2ea 42%, #ffe9f5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      color: #222;
    }
    .blob {
      position: fixed;
      border-radius: 999px;
      filter: blur(14px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }
    .blob.one {
      width: 180px;
      height: 180px;
      background: #ff7dc4;
      top: 36px;
      left: -30px;
    }
    .blob.two {
      width: 220px;
      height: 220px;
      background: #ffd7f0;
      right: -50px;
      top: 160px;
    }
    .blob.three {
      width: 200px;
      height: 200px;
      background: #ffc1df;
      left: 20%;
      bottom: -50px;
    }
    .app {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }
    .page {
      display: none;
      min-height: 78vh;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(6px);
      border-radius: 30px;
      box-shadow: 0 22px 60px rgba(255, 79, 166, 0.18);
      padding: 28px 22px 26px;
      animation: fadeIn 0.28s ease;
    }
    .page.active {
      display: block;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .top-tag {
      display: inline-block;
      background: #ffe2f0;
      color: #ff4fa6;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 34px;
      line-height: 1.15;
      color: #ff4fa6;
      text-align: center;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .intro {
      text-align: center;
      color: #8c5970;
      font-size: 15px;
      line-height: 1.8;
      margin: 0 0 28px 0;
    }
    .question-title {
      font-size: 28px;
      line-height: 1.45;
      font-weight: 850;
      margin: 6px 0 20px;
      color: #222;
    }
    .card {
      background: linear-gradient(180deg, #fff2f8 0%, #ffeaf4 100%);
      border: 1px solid #ffd5e8;
      border-radius: 24px;
      padding: 20px 18px;
      margin-top: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .hint {
      color: #9a6780;
      font-size: 14px;
      line-height: 1.7;
      margin: 10px 0 0;
    }
    select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid #ffb6d7;
      border-radius: 18px;
      padding: 16px 48px 16px 16px;
      font-size: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fff6fb 100%);
      color: #333;
      outline: none;
      box-shadow: 0 6px 16px rgba(255, 79, 166, 0.08);
    }
    .select-wrap {
      position: relative;
      margin-top: 14px;
    }
    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-54%);
      color: #ff4fa6;
      font-size: 28px;
      pointer-events: none;
      font-weight: 700;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    button {
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }
    button:active {
      transform: scale(0.98);
    }
    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, #ff4fa6, #ff6eb8);
      color: white;
      box-shadow: 0 10px 24px rgba(255, 79, 166, 0.28);
    }
    .btn-secondary {
      background: white;
      color: #ff4fa6;
      border: 2px solid #ffc0dd;
      min-width: 92px;
    }
    .tiny {
      text-align: center;
      margin-top: 18px;
      color: #b07892;
      font-size: 12px;
      line-height: 1.7;
    }
    .progress {
      height: 10px;
      background: #ffe2f0;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .bar {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #ff4fa6, #ff85c3);
      border-radius: 999px;
    }
    .bar.full {
      width: 100%;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(34, 16, 27, 0.42);
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 10;
    }
    .modal.show {
      display: flex;
    }
    .result-box {
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow: auto;
      background: linear-gradient(180deg, #fffafc 0%, #fff3f8 100%);
      border-radius: 28px;
      padding: 22px 18px 20px;
      box-shadow: 0 26px 70px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.9);
      animation: popIn 0.22s ease;
    }
    @keyframes popIn {
      from {
        transform: scale(0.96);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    .result-tag {
      display: inline-block;
      background: #ffe4f1;
      color: #ff4fa6;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .result-title {
      margin: 0 0 14px 0;
      font-size: 25px;
      line-height: 1.35;
      font-weight: 900;
      color: #1f1f1f;
    }
    .result-img {
      width: 100%;
      border-radius: 22px;
      display: block;
      margin: 10px 0 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }
    .result-text {
      white-space: pre-line;
      line-height: 1.9;
      color: #414141;
      font-size: 16px;
      margin-bottom: 18px;
    }
    .result-actions {
      display: flex;
      gap: 12px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255,243,248,0.45) 0%, rgba(255,243,248,0.95) 20%, rgba(255,243,248,1) 100%);
      padding-top: 8px;
    }
    @media (max-width: 480px) {
      .page {
        min-height: 76vh;
        padding: 24px 18px 22px;
      }
      h1 {
        font-size: 28px;
      }
      .question-title {
        font-size: 24px;
      }
      .result-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="blob one"></div>
  <div class="blob two"></div>
  <div class="blob three"></div>

  <div class="app">
    <section class="page active" id="page1">
      <div class="top-tag">靠谱人格 · 第一题</div>
      <h1>靠谱人格测试</h1>
      <p class="intro">这不是普通测试，这是对灵魂深处精神生态位的一次严谨勘测。请选择最符合真实情况的选项。</p>

      <div class="progress"><div class="bar"></div></div>

      <div class="card">
        <div class="question-title">第一个问题：<br>你的姓名是什么？</div>
        <div class="select-wrap">
          <select id="q1">
            <option value="">点一下展开选择</option>
            <option value="A">A. 张含墨</option>
            <option value="B">B. 张舒峻</option>
          </select>
        </div>
        <p class="hint">请选择一个。选错也没关系，宇宙会自己记账。</p>
      </div>

      <div class="btn-row">
        <button class="btn-primary" onclick="goNext()">下一题</button>
      </div>

      <div class="tiny">离线抽象人格研究院联合粉色精神分析中心出品</div>
    </section>

    <section class="page" id="page2">
      <div class="top-tag">靠谱人格 · 第二题</div>
      <h1>靠谱人格测试</h1>
      <p class="intro">很好，第一层人格筛查已经结束。现在进入真正决定命运走向的核心问题。</p>

      <div class="progress"><div class="bar full"></div></div>

      <div class="card">
        <div class="question-title">第二个问题：<br>你最爱做的事情是什么？</div>
        <div class="select-wrap">
          <select id="q2">
            <option value="">点一下展开选择</option>
            <option value="A">A. 说神经病</option>
            <option value="B">B. 被说神经病</option>
          </select>
        </div>
        <p class="hint">请如实作答。系统对精神气质非常敏感。</p>
      </div>

      <div class="btn-row">
        <button class="btn-secondary" onclick="goBack()">上一题</button>
        <button class="btn-primary" onclick="showResult()">生成我的靠谱人格</button>
      </div>

      <div class="tiny">最终结果由高浓度粉色算法驱动，仅代表宇宙真相</div>
    </section>
  </div>

  <div class="modal" id="modal">
    <div class="result-box">
      <div class="result-tag">检测完成</div>
      <h2 class="result-title" id="resultTitle"></h2>
      <img class="result-img" id="resultImg" alt="" />
      <div class="result-text" id="resultText"></div>
      <div class="result-actions">
        <button class="btn-secondary" onclick="closeModal()">关闭</button>
        <button class="btn-primary" onclick="restartQuiz()">重新测试</button>
      </div>
    </div>
  </div>

  <script>
    function goNext() {
      const q1 = document.getElementById("q1").value;
      if (!q1) {
        alert("先把第一题选了，再进入下一题。");
        return;
      }
      document.getElementById("page1").classList.remove("active");
      document.getElementById("page2").classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goBack() {
      document.getElementById("page2").classList.remove("active");
      document.getElementById("page1").classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

      const q2 = document.getElementById("q2").value;

`恭喜你解锁了极其罕见的 FROG 大蛤蟆人格。你表面上看起来平静，实际上内心常年蹲在精神池塘边，随时准备“呱”地一下发表惊世骇俗的暴论。你的人生信条不是循规蹈矩，而是突然起跳，精准把离谱甩到所有人脸上。

这种人格最神奇的地方在于：你和普通蛤蟆不一样，你不是活在池塘里，你活在炸锅里。别人是温水煮青蛙，你是高油温炸蛤蟆，外表金黄酥脆，内里依旧弹跳有力，甚至越炸越精神。你一开口，空气里就有一种“谁把锅点着了”的紧张感；你一出场，周围人都会自动进入“这人又要整什么活”的戒备状态。

FROG 大蛤蟆人格说明你天生拥有极强的语言蹦跳力、社交黏液感和精神油炸香气。你的人格不走寻常路，走的是荷叶漂移路线。别人聊天靠逻辑，你聊天靠一个飞扑入锅、强行提鲜。总之，你不是一般人，你是一只被命运撒上椒盐、注定要在宇宙夜市里发光发热的传奇炸蛤蟆。`;
